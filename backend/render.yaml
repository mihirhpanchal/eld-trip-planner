services:
  - type: web
    name: eld-trip-planner-backend
    runtime: python
    region: oregon
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn eld.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: NOMINATIM_USER_AGENT
        value: "eld-trip-planner/1.0 (assessment)"
      - key: LOCATIONIQ_API_KEY
        sync: false
